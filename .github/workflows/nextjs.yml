name: Deploy Vite site to GitHub Pages

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node.jsを設定
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 依存関係をインストール
        run: npm install

      - name: ビルド
        run: npm run build

      - name: distの中身を確認
        run: ls -la dist

      - name: Pagesを設定
        uses: actions/configure-pages@v5

      - name: 成果物をアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: GitHub Pagesにデプロイ
        uses: actions/deploy-pages@v4
